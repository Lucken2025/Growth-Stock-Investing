name: Get Hot News

on:
  schedule:
    - cron: '0 0 * * *'   # UTC 0:00 = 北京时间 8:00
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: crawler-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Run crawler
        env:
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
        run: uv run python -m trendradar
